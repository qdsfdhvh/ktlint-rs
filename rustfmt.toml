# Rustfmt configuration for ktlint-rs
# Run: cargo fmt

edition = "2021"
max_width = 100
tab_spaces = 4
hard_tabs = false

# Import organization
reorder_imports = true

# Code density
newline_style = "Unix"
use_small_heuristics = "Default"

# Merge/short forms
merge_derives = true
use_try_shorthand = true
use_field_init_shorthand = true
force_explicit_abi = true

# Auto-generated stubs with syntax errors — not compiled
ignore = ["src/ktlint_conformance.rs"]