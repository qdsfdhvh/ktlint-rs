name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Format check ──
  fmt:
    name: Stage 1 — Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  # ── Stage 2: Compile check (needs fmt) ──
  check:
    name: Stage 2 — Check
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  # ── Stage 3: Tests (needs check) ──
  test:
    name: Stage 3 — Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  # ── Stage 3 (parallel): macOS test ──
  test-macos:
    name: Stage 3 — Test (macOS)
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  # ── Stage 4: Clippy (needs test) ──
  clippy:
    name: Stage 4 — Clippy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  # ── Stage 3 (parallel): Bench ──
  bench:
    name: Stage 3 — Bench check
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --benches

  # ── Stage 3 (parallel): Self-test ──
  ktlint-self-test:
    name: Stage 3 — Self-test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Lint with ktlint
        run: ./target/release/ktlint-rs --ruleset ktlint tests/fixtures/nowinandroid
      - name: Lint with detekt
        run: ./target/release/ktlint-rs --ruleset detekt tests/fixtures/nowinandroid
      - name: Format self-test
        run: ./target/release/ktlint-rs --format src/rules/detekt/style/unused_import.rs
