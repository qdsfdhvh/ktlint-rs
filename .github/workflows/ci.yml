name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  test-macos:
    name: Test (macOS, arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  check:
    name: Check (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  bench:
    name: Benchmark (check only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --benches

  ktlint-self-test:
    name: ktlint-rs self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Lint with ktlint rules (should pass)
        run: ./target/release/ktlint-rs --ruleset ktlint tests/fixtures/nowinandroid --relative
      - name: Lint with detekt rules
        run: ./target/release/ktlint-rs --ruleset detekt tests/fixtures/nowinandroid --relative
      - name: Format self-test
        run: |
          cp Cargo.toml /tmp/Cargo.toml.bak
          ./target/release/ktlint-rs --format src/rules/detekt/style/unused_import.rs
          echo "Formatter self-test passed"


  kotlinc-plugin-validate:
    name: kotlinc type extractor plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install kotlinc
        run: |
          curl -sL https://github.com/JetBrains/kotlin/releases/download/v2.1.0/kotlin-compiler-2.1.0.zip -o /tmp/kotlin.zip
          unzip -q /tmp/kotlin.zip -d /tmp/kotlin
          echo "/tmp/kotlin/kotlinc/bin" >> $GITHUB_PATH
      - name: Test plugin on fixture
        run: |
          echo "val x: String = \"hello\"" > /tmp/test.kt
          echo "val y: String? = null" >> /tmp/test.kt
          /tmp/kotlin/kotlinc/bin/kotlinc -script contrib/kotlinc-plugin/TypeExtractor.kt -- /tmp/test.kt 2>&1 | head -5
