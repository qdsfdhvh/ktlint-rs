name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --release
      - run: cargo build --release

  parity:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Install JVM ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      - name: Run parity check
        run: |
          export KTLINT_COMPAT=1
          python3 tools/compare.py tests/fixtures/demo-gradle
      - name: Check violation count ratio
        run: |
          export KTLINT_COMPAT=1
          JVM=$(ktlint tests/fixtures/demo-gradle 2>&1 | grep -c "\.kt:" || echo 0)
          RS=$(./target/release/ktlint tests/fixtures/demo-gradle 2>/dev/null | grep -c "\.kt:" || echo 0)
          echo "JVM: $JVM, ktlint-rs: $RS"
          RATIO=$(echo "scale=2; $RS / $JVM * 100" | bc)
          echo "Match ratio: $RATIO%"
          # Must be within 150% of JVM
          if [ $(echo "$RATIO < 50" | bc) -eq 1 ]; then echo "FAIL: parity too low!"; exit 1; fi